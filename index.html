<!DOCTYPE html>
<html>
<head>
    <title>Ambition Game</title>
    <style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    animation: bg 10s ease infinite;
    background: linear-gradient(to right, red, blue) !important;
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
    color: white;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

h1, p, h2 {
    text-shadow: 2px 2px 5px black;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    margin-left: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

    <h1>Ambition Game</h1>
    <p>Pick a number from 1 to 30</p>

    <input type="number" id="num" min="1" max="30">
    <button onclick="checkNumber()">Pick</button>

    <h2 id="result"></h2>

    <script>
        function checkNumber() {

            let num = document.getElementById("num").value;
            let result = "";

            switch(num) {
                case "1": result = "Dustbin packer"; break;
                case "2": result = "Mad man"; break;
                case "3": result = "BEGGAR"; break;
                case "4": result = "ACCOUNTANT"; break;
                case "5": result = "HOUSE HELP"; break;
                case "6": result = "TOILET CLEANER"; break;
                case "7": result = "FISHER MAN"; break;
                case "8": result = "ASTRONAUT"; break;
                case "9": result = "SAILOR"; break;
                case "10": result = "MECHANIC"; break;
                case "26": result = "PROGRAMMER"; break;
                case "28": result = "FASHION DESIGNER"; break;
                case "29": result = "FARMER"; break;
                case "30": result = "DOCTOR"; break;
                default: result = "Choose a number from 1 to 30";
            }

            document.getElementById("result").innerText = result;
        }
    </script>

</body>
</html>
